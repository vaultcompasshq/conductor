# Conductor project config (example)
# Copy to .conductor/config.yaml in your project

version: "1.0.0"

drift:
  # When to run drift checks: handoff | file_write | every_turn
  mode: handoff
  thresholds:
    info: 26
    warn: 51
    soft_block: 71
    hard_block: 86
  hard_block_on_critical_constraints: true

coach:
  show_when_score_below: 60
  patterns_enabled: all

constraints:
  priority_order:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
    - cursor-rules
    - project-spec

files:
  active_contract: intent-contract.yaml
  contracts_dir: contracts
  drift_log: drift-log.jsonl

integrations:
  superpowers:
    require_contract_before:
      - brainstorming
      - test-driven-development
  downstream_pipeline:
    enabled: false
    issue_tracker_team_id: null
